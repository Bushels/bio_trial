<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#3d7a2f">
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wfiijmew82");
  </script>
  <title>Your Buperac Trial</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Permanent+Marker&family=Special+Elite&family=Cutive+Mono&family=Inter:wght@400;500;600;700&family=IM+Fell+English+SC&family=Kalam:wght@400;700&display=swap">
  <link rel="stylesheet" href="farmer.css" />
</head>
<body class="farmer">
  <main class="desk">
    <div class="wrap">
      <div class="top-bar">
        <span>Your Buperac Trial</span>
        <a href="index.html">← enrolment page</a>
      </div>

      <div id="authError" class="auth-error" hidden></div>

      <!-- Header folder: farm name, province, shipment / payment dots -->
      <section id="signupSummary" class="folder" hidden>
        <span class="folder-tape" aria-hidden="true"></span>
      </section>

      <!-- Quick-tiles: counts of what the farmer has logged so far -->
      <section id="quickTiles" class="quick-tiles" hidden></section>

      <!-- Two-column board (stacks on mobile) -->
      <div class="board">

        <!-- Left column: fields + event log + timeline -->
        <div>
          <section id="fieldsSection" class="panel" hidden>
            <h2 class="panel-title">Your fields</h2>
            <p class="panel-sub">Declare trial types, log results, or add a new field.</p>
            <div id="fieldsList" class="fields"></div>
            <div class="log-actions">
              <button id="addFieldBtn" class="log-btn" type="button">
                + Add a field <span class="arrow">→</span>
              </button>
              <button id="openEventBtn" class="log-btn" type="button">
                + Log a result <span class="arrow">→</span>
              </button>
            </div>
            <div id="fieldFormHost"></div>
          </section>

          <section id="eventSection" class="panel" hidden>
            <h2 class="panel-title">Log a result</h2>
            <p class="panel-sub">Application, observation, yield, soil test, photo — pick a kind and attach a file if you have one.</p>
            <div id="eventFormHost"></div>
          </section>

          <section id="timelineSection" class="panel" hidden>
            <h2 class="panel-title">Your timeline</h2>
            <p class="panel-sub">Everything you (or Telegram) logged this season.</p>
            <div id="timelineList" class="timeline"></div>
          </section>
        </div>

        <!-- Right column: Telegram inbox + shipment + public-scoreboard panel -->
        <div>
          <section id="telegramSection" class="panel" hidden></section>
          <section id="shipmentSection" class="panel" hidden></section>
          <section id="publicSection" class="panel" hidden></section>
        </div>
      </div>
    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="farmer.js" defer></script>
</body>
</html>
